services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devops
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops-net

  app:
    build: ./app
    environment:
      DB_HOST: db
      DB_NAME: devops
      DB_USER: devops
      DB_PASSWORD: password
    depends_on:
      - db
    networks:
      - devops-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - devops-net

volumes:
  postgres_data:

networks:
  devops-net:
    driver: bridge
